name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test with coverage
        run: uv run pytest -q --cov --cov-report=term-missing

      - name: Compile Python sources
        run: uv run python -m compileall -q src tests dags

      - name: Validate Docker Compose configuration
        run: docker compose --profile airflow config --quiet

      - name: Run pipeline smoke test
        run: >-
          uv run retail-pipeline
          --raw-dir data/raw
          --processed-dir build/processed
          --reports-dir build/reports
